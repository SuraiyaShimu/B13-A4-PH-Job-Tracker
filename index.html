<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>

     <!-- tailwind + daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">


     <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <style>
        *{
            font-family: "Outfit", sans-serif; 
        }
    </style>

</head>
<body class="bg-base-200 max-w-md mx-auto min-h-screen">

    <header class="p-4 bg-base-200 shadow">
        <h1 class="text-2xl font-bold">Job Application Tracker</h1>

        <div class="grid grid-cols-3 gap-2 mt-4">
            <div class="p-3 bg-base-100 rounded">
                <p class="text-sm">Total</p>
                <h2 id="total-count" class="font-bold">0</h2>

            </div>

            <div class="p-3 bg-base-100 rounded">
                <p class="text-sm">Interview</p>
                <h2 id="interview-count" class="font-bold text-green-600">0</h2>

            </div>

            <div class="p-3 bg-base-100 rounded">
                <p class="text-sm">Rejected</p>
                <h2 id="rejected-count" class="font-bold text-red-500">0</h2>

            </div>

        </div>

    </header>

    <section class="grid grid-cols-2">
         <div>
            <h2 class="p-3 font-bold">Available Jobs</h2>
         </div>

         <div>
              <h2 id="total-count" class="p-3 px-20">0 jobs</h2>
         </div>

    </section>

    <section class="p-3 flex gap-2">
        <button class=" btn btn-sm">All</button>
        <button class=" btn btn-sm">Interview</button>
        <button class=" btn btn-sm">Rejected</button>

    

    </section>

<!-- Empty State -->
 <section id="empty-state" class="hidden text-center p-10">
   <img src="jobs.png" alt="">
   <h2 class="mt-3 font-bold">No Jobs Available</h2>
   <p class="text-sm text-gray-500">Check back soon for new job opportunities</p>
 </section>

    <script src="script/jobs.js"></script>
    
    
</body>
</html>
